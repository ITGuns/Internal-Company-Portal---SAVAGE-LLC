services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: portal_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-portal_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - portal_network

  # Redis Service for distributed auth rate limiting
  redis:
    image: redis:7-alpine
    container_name: portal_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - portal_network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal_backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-portal_db}?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_RATE_LIMIT_STORE: redis
      AUTH_RATE_LIMIT_REDIS_PREFIX: portal:auth-rate-limit
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      CORS_ORIGIN: http://localhost:3000
      OPS_MANAGER_EMAIL: ${OPS_MANAGER_EMAIL:-ops-manager@example.com}
      EMAIL_ENABLED: "false" # Set true if SMTP/SendGrid configured
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - portal_network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portal_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    networks:
      - portal_network

volumes:
  postgres_data:
  redis_data:


networks:
  portal_network:
    driver: bridge
