version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: portal_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-portal_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - portal_network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-portal_db}?schema=public
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      EMAIL_ENABLED: "false" # Set true if SMTP/SendGrid configured
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - portal_network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portal_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    networks:
      - portal_network

volumes:
  postgres_data:


networks:
  portal_network:
    driver: bridge
