name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      JWT_SECRET: local-ci-jwt-secret
      REFRESH_TOKEN_SECRET: local-ci-refresh-secret

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Validate Prisma Schema
      working-directory: ./backend
      run: npx prisma validate

    - name: Generate Prisma Client
      working-directory: ./backend
      run: npx prisma generate

    - name: Provision Test Database Schema
      working-directory: ./backend
      run: npx prisma db push --skip-generate

    - name: Test Backend
      working-directory: ./backend
      run: npm test

    - name: Build Backend
      working-directory: ./backend
      run: npm run build

    - name: Audit Backend Dependencies
      working-directory: ./backend
      run: npm audit --audit-level=high

  build-frontend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Test Frontend
      working-directory: ./frontend
      run: npm test

    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
      env:
        # Avoid connecting to real backend during build if possible
        NEXT_PUBLIC_API_URL: http://localhost:4000/api

    - name: Audit Frontend Dependencies
      working-directory: ./frontend
      run: npm audit --audit-level=high

  repository-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check Whitespace
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git diff --check "origin/${{ github.base_ref }}...HEAD"
        elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
          git diff --check "${{ github.event.before }}" "${{ github.sha }}"
        else
          git diff-tree --check --root --no-commit-id -r HEAD
        fi

    - name: Validate Docker Compose Config
      run: docker compose config
      env:
        POSTGRES_PASSWORD: local-compose-check-password
        JWT_SECRET: local-compose-check-jwt-secret
        REFRESH_TOKEN_SECRET: local-compose-check-refresh-secret
